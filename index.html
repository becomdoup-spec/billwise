<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#090c0e" />
    <meta name="description" content="BillWise — Smart bill splitting for groups" />
    <title>BillWise</title>
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      html { background: #f8fafc; }
      body { overscroll-behavior: none; }
      /* iOS safe-area support */
      body { padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
    </style>
    <script>
      // Apply the saved/system theme before first paint to avoid a flash.
      // Priority: user-saved > admin-default > light (app default)
      (function () {
        var DARK_THEMES = ['dark','gold','yellow-black','orange-black','blue-dark','aurora']
        try {
          var t = localStorage.getItem('billwise-theme')
            || localStorage.getItem('billwise-admin-default-theme')
            || 'light'
          document.documentElement.dataset.theme = t
          document.documentElement.classList.toggle('dark', DARK_THEMES.indexOf(t) !== -1)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
